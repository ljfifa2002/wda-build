name: Build WDA IPA (unsigned)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Build WDA for real device (unsigned)
        run: |
          xcodebuild clean build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -derivedDataPath wda_build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS=arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Locate artifacts
        run: |
          echo "=== xctestrun files ==="
          find wda_build -name "*.xctestrun" | head -5
          echo "=== Runner app ==="
          find wda_build -name "WebDriverAgentRunner-Runner.app" -maxdepth 6 | head -3
          echo "=== Products dir ==="
          ls wda_build/Build/Products/

      - name: Package artifacts
        run: |
          PRODUCTS_DIR="wda_build/Build/Products"
          XCTESTRUN=$(find "$PRODUCTS_DIR" -name "*.xctestrun" | head -1)
          APP_DIR=$(find "$PRODUCTS_DIR" -name "WebDriverAgentRunner-Runner.app" -maxdepth 4 | head -1)

          echo "xctestrun: $XCTESTRUN"
          echo "app: $APP_DIR"

          mkdir -p wda_output
          cp "$XCTESTRUN" wda_output/
          cp -r "$APP_DIR" wda_output/

          # Zip the raw .app on its own — a Release asset must be a file, not a
          # directory, and the device-side flow ldid-signs the extracted .app.
          # -y stores symlinks as symlinks so the bundle structure stays intact.
          ( cd "$(dirname "$APP_DIR")" && zip -ry "$GITHUB_WORKSPACE/wda_output/WebDriverAgentRunner-Runner.app.zip" "WebDriverAgentRunner-Runner.app" )

          # Unsigned IPA (Payload/<app>) for `ios install` / extraction on device.
          mkdir -p Payload
          cp -r "$APP_DIR" Payload/
          zip -ry wda_output/WebDriverAgent-unsigned.ipa Payload/

          echo "=== wda_output contents ==="
          ls -lh wda_output/

      - uses: actions/upload-artifact@v4
        with:
          name: wda-artifacts
          path: wda_output/
          retention-days: 30

      # On a v* tag, publish the packaged build as a GitHub Release so the
      # device-side deploy has a stable per-version download URL (mirrors the
      # payload repo's tag → Release convention).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wda_output/WebDriverAgent-unsigned.ipa
            wda_output/WebDriverAgentRunner-Runner.app.zip
          name: WDA ${{ github.ref_name }}
          body: |
            Unsigned WebDriverAgentRunner build for pecker-agent iOS remote control (plan B).
            Built from WDA 13.0.0 on Xcode 16.4 with CODE_SIGNING_ALLOWED=NO.

            ## Files
            - `WebDriverAgent-unsigned.ipa` — Payload/WebDriverAgentRunner-Runner.app, unsigned
            - `WebDriverAgentRunner-Runner.app.zip` — raw .app for on-device ldid signing

            ## Device-side (jailbroken)
            ldid pseudo-sign + entitlements → install → `ios runwda`.
